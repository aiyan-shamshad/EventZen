server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: user-auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: event-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/events/**

        - id: attendee-service
          uri: http://localhost:3001
          predicates:
            - Path=/api/attendees/**

        - id: budget-service
          uri: http://localhost:3002
          predicates:
            - Path=/api/budget/**

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: User & Auth Service
        url: /api/auth/v3/api-docs
      - name: Event Service
        url: /api/events/v3/api-docs
      # Note: Node.js services (Attendee/Budget) don't have v3/api-docs yet. 
      # We would need to implement Swagger in them to add them here.
