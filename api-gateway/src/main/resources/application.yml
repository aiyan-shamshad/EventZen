server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: user-auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: event-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/events/**

        - id: attendee-service
          uri: http://localhost:3001
          predicates:
            - Path=/api/attendees/**

        - id: budget-service
          uri: http://localhost:3002
          predicates:
            - Path=/api/budget/**
