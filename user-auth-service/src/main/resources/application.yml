server:
  port: 8081
  error:
    include-message: always

spring:
  application:
    name: user-auth-service

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/eventzen_users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Aiyan123@}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your_jwt_secret_at_least_256_bits_long}
  expiration: 86400000  # 24 hours in milliseconds

# Swagger
springdoc:
  api-docs:
    path: /api/auth/api-docs
  swagger-ui:
    path: /swagger-ui.html
